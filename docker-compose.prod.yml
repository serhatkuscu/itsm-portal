services:
  api:
    build:
      context: .
      dockerfile: src/Itsm.Api/Dockerfile
    container_name: itsm_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=itsmportal;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=ItsmPortal
      - JwtSettings__Audience=ItsmPortal
      - JwtSettings__ExpiryMinutes=60
      - AllowedOrigins__0=https://itsm.hypeimpro.com
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    networks:
      - itsm_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://itsm.hypeimpro.com/api
    container_name: itsm_frontend
    environment:
      - NODE_ENV=production
    networks:
      - itsm_network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: itsm_postgres
    environment:
      - POSTGRES_DB=itsmportal
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itsm_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: itsm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    networks:
      - itsm_network
    restart: unless-stopped

volumes:
  postgres_data:
  api_logs:

networks:
  itsm_network:
    driver: bridge
